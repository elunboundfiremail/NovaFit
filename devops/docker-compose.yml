services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: novafit_postgres
    environment:
      POSTGRES_DB: novafit_db
      POSTGRES_USER: novafit_user
      POSTGRES_PASSWORD: Upds123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - novafit_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novafit_user -d novafit_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Keycloak Authentication Server
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: novafit_keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_postgres:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: Upds123
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Upds123
    ports:
      - "8080:8080"
    depends_on:
      keycloak_postgres:
        condition: service_healthy
    networks:
      - novafit_network
    command:
      - start-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # PostgreSQL para Keycloak (separado para buenas practicas)
  keycloak_postgres:
    image: postgres:16-alpine
    container_name: novafit_keycloak_db
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: Upds123
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - novafit_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  novafit_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  keycloak_postgres_data:
    driver: local

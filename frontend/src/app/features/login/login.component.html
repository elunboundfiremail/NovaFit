<div class="login-page">
  <div class="login-card">
    <div class="brand-block">
      <h1>NovaFit</h1>
      <p>Sistema de gestion del gimnasio</p>
    </div>

    <div class="form-block">
      <h2>Ingreso de Administrador</h2>
      <p class="helper-text">Acceda con su usuario y contrasena para trabajar en el sistema.</p>

      <div class="form-group">
        <label>Usuario</label>
        <input
          type="text"
          [(ngModel)]="username"
          placeholder="admin_novafit"
          class="form-control"
          [disabled]="loading"
          (keyup.enter)="ingresar()">
      </div>

      <div class="form-group">
        <label>Contrasena</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="••••••"
          class="form-control"
          [disabled]="loading"
          (keyup.enter)="ingresar()">
      </div>

      <button class="btn btn-primary btn-block" (click)="ingresar()" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>

      <p *ngIf="error" class="error-text">{{ error }}</p>
    </div>
  </div>
</div>
